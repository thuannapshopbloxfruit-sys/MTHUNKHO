<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>QUẢN LÝ KHO PHỤ TÙNG</title>
</head>
<body>
    <div id="login-screen" class="container">
        <h2>🔒 ĐĂNG NHẬP</h2>
        <input type="password" id="pass-input" placeholder="Mật khẩu...">
        <button onclick="checkLogin()">Truy cập</button>
    </div>

    <div id="app" class="container" style="display: none;">
        <h1>KHO PHỤ TÙNG XE ỦI</h1>
        
        <div id="stats-box">
            <strong>📊 Tổng số loại phụ tùng: <span id="total-count">0</span></strong>
        </div>

        <div class="controls">
            <button onclick="exportData()" class="btn-export">Xuất file dữ liệu</button>
            <label for="importFile" class="btn-import">
                Nhập file dữ liệu
            </label>
            <input type="file" id="importFile" onchange="importData(event)" accept=".json" style="display: none;">
        </div>

        <input type="text" id="search" placeholder="🔍 Tìm kiếm..." onkeyup="filterItems()">
        <button id="add-btn" onclick="toggleForm()">➕ Thêm phụ tùng</button>
        
        <div id="form-container" style="display:none;">
            <input type="text" id="name" placeholder="Tên phụ tùng">
            <input type="text" id="code" placeholder="Mã phụ tùng">
            <input type="text" id="loc" placeholder="Vị trí (Kệ/Ô)">
            <input type="file" id="img-input" accept="image/*">
            <button onclick="addItem()" class="btn-save">Lưu vào kho</button>
        </div>

        <div id="inventory-list"></div>
    </div>

    <div id="imgModal" class="modal" onclick="this.style.display='none'">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="fullImg">
    </div>

    <script src="script.js"></script>
</body>
</html>
